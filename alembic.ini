# A generic Alembic configuration file.

[alembic]
# path to migration scripts
script_location = migrations

# template for migration file names
file_template = %%(rev)s_%%(slug)s

# The database connection URL.
# The actual credentials will be loaded from environment variables
# by our application's code, not hardcoded here.
sqlalchemy.url = postgresql://electa:electa@db:5432/electa_db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S